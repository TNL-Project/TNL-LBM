default:
  interruptible: true
  image: "registry.gitlab.com/tnl-project/container-images/archlinux-tnl-cuda:latest"
  before_script:
    # make sure that $PATH and other essential variables are set correctly
    - source /etc/profile
    # 1. fall back to arch 7.5 when the builder has no GPU to avoid building for all GPU architectures
    # 2. cmake can't detect the native architecture when using clang
    - if ! nvidia-smi --list-gpus > /dev/null; then
            CUDA_ARCH=75;
      elif [[ ${CUDACXX} == "clang++" ]]; then
            CUDA_ARCH=$(nvidia-smi --query-gpu=compute_cap --format=csv,noheader | head -n 1 | tr -d '.');
      else
            CUDA_ARCH=native;
      fi
    # extra dependencies for python bindings
    - pacman -Suy --needed --noconfirm python-mpi4py

variables:
  # avoid Open MPI abort on dual-accelerator hosts (both CUDA and ROCm detected)
  OMPI_MCA_accelerator: "null"

stages:
  - lint
  - build

typos:
  stage: lint
  image: "quay.io/archlinux/archlinux:base"
  before_script:
    - pacman -Syu --needed --noconfirm typos
  script:
    - typos --color always --sort

build_CUDA_Release:
  stage: build
  tags:
    - docker
    - nvidia
  script:
    # ParaView provides the libcatalyst-paraview.so implementation required by the inline Catalyst plugin test.
    # --overwrite is needed because the NVIDIA CDI runtime creates a symlink for libGLX_indirect.so.0 to libGLX_nvidia.so,
    # which otherwise conflicts with the mesa dependency of paraview.
    - pacman -Suy --needed --noconfirm --overwrite 'usr/lib/libGLX_indirect.so*' paraview
    - cmake -B build -S . -G Ninja
            -DCMAKE_BUILD_TYPE=Release
            -DCMAKE_CUDA_ARCHITECTURES=${CUDA_ARCH}
    - cmake --build build
    # regression tests for LBM-IBM
    - ./tests/compare-IBM-matrices.sh CPU
    - ./tests/compare-IBM-matrices.sh GPU
    # end-to-end output-data test
    - ./tests/compare-outputdata.sh
  variables:
    # CUDA builds run on runners with GPU passthrough
    OMPI_MCA_accelerator: "cuda"

build_CUDA_Debug:
  stage: build
  tags:
    - docker
    - nvidia
  script:
    - cmake -B build -S . -G Ninja
            -DCMAKE_BUILD_TYPE=Debug
            -DCMAKE_CUDA_ARCHITECTURES=${CUDA_ARCH}
    - cmake --build build
  variables:
    # CUDA builds run on runners with GPU passthrough
    OMPI_MCA_accelerator: "cuda"

build_HIP_Release:
  stage: build
  image: "registry.gitlab.com/tnl-project/container-images/archlinux-tnl-rocm:latest"
  tags:
    - docker
    - hip-rocm
  script:
    - cmake -B build -S . -G Ninja
            -DCMAKE_BUILD_TYPE=Release
    - cmake --build build
  variables:
    # ROCm builds run on runners with AMD GPU passthrough
    OMPI_MCA_accelerator: "rocm"

build_HIP_Debug:
  stage: build
  image: "registry.gitlab.com/tnl-project/container-images/archlinux-tnl-rocm:latest"
  tags:
    - docker
    - hip-rocm
  script:
    - cmake -B build -S . -G Ninja
            -DCMAKE_BUILD_TYPE=Debug
    - cmake --build build
  variables:
    # ROCm builds run on runners with AMD GPU passthrough
    OMPI_MCA_accelerator: "rocm"

build_without_MPI:
  stage: build
  script:
    - cmake -B build -S . -G Ninja
            -DCMAKE_BUILD_TYPE=Debug
            -DCMAKE_CUDA_ARCHITECTURES=${CUDA_ARCH}
            -DTNL_LBM_ENABLE_MPI=OFF
    - cmake --build build

build_subproject:
  stage: build
  image: "registry.gitlab.com/tnl-project/container-images/archlinux-cuda:latest"
  script:
    - pacman -Syu --needed --noconfirm cmake ninja git libpng fmt spdlog adios2
    - cd tests/subproject
    - cmake -B build -S . -G Ninja
            -DCMAKE_BUILD_TYPE=Debug
            -DCMAKE_CUDA_ARCHITECTURES=${CUDA_ARCH}
    - cmake --build build
